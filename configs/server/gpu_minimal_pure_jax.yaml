# Small pure-JAX CUDA smoke config.
#
# Use this to validate installation and server wiring on a new GPU before
# paying the compile cost of the optimized serving path.

server:
  host: "127.0.0.1"
  port: 6791
  max_tokens_default: 16

engine:
  model: "Qwen/Qwen3.5-0.8B"
  backend: "gpu"
  dtype: "float32"
  weight_dtype: "bfloat16"
  jax_execution: "jit"
  prefill_buckets: "16,32,64,128"
  prefill_token_buckets: "16,32,64,128"
  prefill_layout: "packed"
  batch_size_buckets: "1,2"
  max_prefill: 128
  max_kv_cache_mb: 512
  num_kvcache_blocks: 128
  max_num_seqs: 2
  max_num_resident_seqs: 2
  max_num_batched_tokens: 256
  max_blocks_per_seq: 32
  prefix_cache: true
  speculative_method: "none"
  num_speculative_tokens: 0
  skip_compile: false

runtime:
  platform: "cuda"
  tokenizers_parallelism: false
  xla:
    preallocate: false
    gpu_allocator: "cuda_malloc_async"
    flags: "--xla_gpu_autotune_level=4"
  fastpaths:
    greedy_token: true
    sampled_token: true
    device_token_carry: false
    static_decode_metadata: false
    resident_decode_metadata: false
    trace_token_prefetch: true

kernels:
  backend: "pure_jax"
  allow_local_cuda_probes: false
  full_attention:
    kv_cache_dtype: "default"
    kv_append_impl: "reference"
    prefill_impl: "reference"
    decode_impl: "reference"
  gdn:
    disable_fallbacks: false
    prefill_post_conv_impl: "off"
    packed_decode:
      impl: "off"

env: {}
